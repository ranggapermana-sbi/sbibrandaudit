<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f8fafc; color: #334155;">
    <div style="text-align: center; padding: 24px; max-width: 320px; width: 100%; box-sizing: border-box;">
        <div style="border: 3px solid #e2e8f0; border-top: 3px solid #4f46e5; border-radius: 50%; width: 32px; height: 32px; animation: spin 0.8s linear infinite; margin: 0 auto 20px auto;"></div>
        <h3 style="font-size: 16px; font-weight: 700; margin: 0 0 8px 0; color: #1e293b;">Connecting Account</h3>
        <p style="font-size: 13px; color: #64748b; margin: 0; line-height: 1.5;">Completing Swiss-Belhotel single sign-on verification...</p>
    </div>
    
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>

    <script>
        // Extract parameters from hash and query string
        const hashParams = window.location.hash || '';
        const searchParams = window.location.search || '';

        // Safely communicate with the parent/opener window
        if (window.opener) {
            try {
                window.opener.postMessage({
                    type: 'SUPABASE_OAUTH_SUCCESS',
                    hash: hashParams,
                    search: searchParams
                }, window.location.origin);
            } catch (err) {
                // If origin match fails due to some proxy layers, fallback to wildcard posting for safety
                window.opener.postMessage({
                    type: 'SUPABASE_OAUTH_SUCCESS',
                    hash: hashParams,
                    search: searchParams
                }, '*');
            }
            
            // Allow a brief moment for the parent to capture then shut down the popup
            setTimeout(() => {
                window.close();
            }, 800);
        } else {
            // No opener: likely a direct access, redirect cleanly to site root
            window.location.href = '/';
        }
    </script>
</body>
</html>
